services:
  tradingagents-api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - .:/app  # For hot-reload during development

  tradingagents-web:
    build: .
    command: streamlit run web/app.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - tradingagents-api
    environment:
      - WEB_PASSWORD=${WEB_PASSWORD}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
      # IMPORTANT: must point to the API service name, not localhost
      - API_BASE_URL=http://tradingagents-api:8000
    volumes:
      - .:/app # For hot-reload during development

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    command: tradingagents
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

  # CLI version for backward compatibility
  tradingagents-cli:
    build: .
    command: tradingagents
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

volumes:
  tradingagents_data:
  ollama_data:
